<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anone | Welcome</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-body">
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-brand">
          <p class="eyebrow">Anone</p>
          <h1>Banking and investing simplified</h1>
          <p>Access your finances, transfer funds, and grow your portfolio from one modern dashboard.</p>
        </div>

        <div class="landing-actions">
          <a class="button-link" href="/login">Sign in</a>
          <a class="ghost-link" href="/signup">Create account</a>
        </div>

        <div class="support-box">
          <p><strong>Secure access</strong></p>
          <p>Use your account details to continue into the dashboard and manage your balance, investing, and support requests.</p>
        </div>
      </div>
    </div>
  </body>
</html>
