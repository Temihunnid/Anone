<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body.auth-body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #0f1115;
        color: #f4f4f5;
        padding: 24px;
      }

      .auth-shell {
        width: 100%;
        display: flex;
        justify-content: center;
      }

      .auth-card {
        width: 100%;
        max-width: 420px;
        background: #1a1d24;
        border: 1px solid #2a2e38;
        border-radius: 16px;
        padding: 48px 40px;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      }

      .auth-brand .eyebrow {
        margin: 0 0 8px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.12em;
        color: #7c8296;
        text-transform: uppercase;
      }

      .auth-brand h1 {
        margin: 0 0 12px;
        font-size: 28px;
        font-weight: 700;
        color: #ffffff;
      }

      .auth-brand p {
        margin: 0 0 28px;
        font-size: 15px;
        line-height: 1.5;
        color: #a4a9b8;
      }

      .ghost-link {
        display: inline-block;
        padding: 12px 24px;
        border: 1px solid #3a3f4c;
        border-radius: 8px;
        color: #f4f4f5;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
        transition: background 0.15s ease, border-color 0.15s ease;
      }

      .ghost-link:hover {
        background: #2a2e38;
        border-color: #4a5063;
      }
    </style>
  </head>
  <body class="auth-body">
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-brand">
          <p class="eyebrow">404</p>
          <h1>Page not found</h1>
          <p>The page you were looking for doesn't exist. You can return to the dashboard or try a different link.</p>
        </div>
        <a class="ghost-link" href="index.html">Back to home</a>
      </div>
    </div>
  </body>
</html>
