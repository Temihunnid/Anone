<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anone | Create Account</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="auth-body">
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-brand">
          <p class="eyebrow">Join Anone</p>
          <h1>Create your secure account</h1>
          <p>Open a professional banking and investing account with real-time access to your dashboard.</p>
        </div>
        <form id="signup-form" class="auth-form">
          <label for="full-name">Full Name</label>
          <input type="text" id="full-name" placeholder="Jane Doe" required />
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required />
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" placeholder="Create a strong password" required />
          <label for="confirm-password">Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Re-enter password" required />
          <button type="submit">Create Account</button>
        </form>
      </div>
    </div>
    <script src="/signup.js"></script>
  </body>
</html>
